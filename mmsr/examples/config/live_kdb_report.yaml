report:
  title: "Japanese Market Microstructure Monitor"
  template: "default"
  custom_template_dir: null
  branding:
    brand_name: "Your Firm"
    logo_image_src: null
    header_image_src: null
    footer_image_src: null
    footer_text: "Generated by mmsr"

data:
  source: kdb
  kdb:
    calculation_namespace: ".desk.mmsr"
    enforce_daily_raw_scope: true
    symbol_chunk_size: 500
    # Chunk raw source calls by stocks and aggregate by symbol before
    # concatenating chunk outputs, avoiding full-universe trade/quote scans.
    symbol_chunk_group_by:
      - sym
    # q-side rollups generated from razed chunk outputs.
    aggregation_levels:
      - market
      - market_bucket
      - topix_cap_group
      - topix_cap_group_bucket
      - symbol
      - symbol_bucket
    raw_data_functions:
      namespace: ".sb.mmsr"
      trade: "getTrade"
      quote: "getQuote"
      # Toxicity-only PTS trade source; activity metrics continue to use getTrade.
      pts_trade: "getPtsTrade"
      # Toxicity-only PTS quote source; used to infer aggressorSide per PTS venue/symbol.
      pts_quote: "getPtsQuote"
      # Primary quotes provide the TSE/primary at-trade and future mids.
      primary_quote: "getQuote"
      reference_data: "getRef"

calendar:
  source: kdb
  namespace: ".sb.mmsr"
  function: "getTradingCalendar"
  date_column: date


reference_data:
  source: kdb
  namespace: ".sb.mmsr"
  function: "getRef"
  symbol_column: sym
  ric_column: ric

period:
  start_date: "2026-05-01"
  end_date: "2026-05-22"

intraday:
  bucket_size: "5m"
  align_to_session: true
  auction_buckets:
    enabled: true
    labels:
      morning_open: AMO
      morning_close: AMC
      afternoon_open: PMO
      afternoon_close: PMC

groups:
  - topixCapGrp

reference:
  method: same_intraday_bucket
  lookback_days: 20
  statistic: median
  observation_unit: trading_day
  comparable_keys:
    - metric_name
    - time_bucket
    - group
  min_samples_for_z_score: 30
  min_samples_for_empirical_percentile: 10
  default_user_facing_score: empirical_percentile
  default_technical_score: robust_z_score
  insufficient_history_behavior: change_only

# Keep this production starter restricted to the market-monitoring metrics that
# belong in this report: activity, displayed liquidity, and cross-venue
# primary-quote reversion. Optional add-ons such as tick-normalized spread,
# quote-mid realized volatility, and feed-signed order-flow imbalance remain
# supported by checked-in q templates, but are intentionally not enabled here
# because they require additional source fields and report-design choices.
metrics:
  - turnover
  - volume
  - trade_count
  - quoted_spread_bps
  - top_of_book_depth
  - primary_quote_reversion_10ms_bps
  - primary_quote_reversion_100ms_bps
  - primary_quote_reversion_500ms_bps
  - primary_quote_reversion_1s_bps
  - primary_quote_reversion_5s_bps
  - primary_quote_reversion_10s_bps

commentary:
  mode: template
  llm_enabled: false
  alert_zscore_threshold: 2.0
  watch_zscore_threshold: 1.5
  max_comments_per_page: 5

toxicity:
  enabled: true
  section_title: "Cross-Venue Toxicity"
  primary_venue: "TSE"
  reversion_horizons:
    - "10ms"
    - "100ms"
    - "500ms"
    - "1s"
    - "5s"
    - "10s"
  default_visual:
    type: "venue_reversion_curve"
    x_axis: "horizon"
    y_axis: "reversion_bps"
    series: "venue"
  side_source: "inferred"
  filters:
    exclude_auction: true
    exclude_stale_primary_quote: true
    max_primary_quote_age: "1s"
    max_pts_quote_age: "1s"
  confidence:
    min_trade_count: 100
    min_notional: 100000000
