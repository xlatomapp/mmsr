report:
  title: "Japanese Market Microstructure Monitor"
  template: "default"
  custom_template_dir: null
  branding:
    brand_name: "Your Firm"
    logo_image_src: null
    header_image_src: null
    footer_image_src: null
    footer_text: "Generated by mmsr"
  outputs:
    html: true
    excel: false
    pdf: false

data:
  source: kdb
  tables:
    trades: trade
    quotes: quote
    symbols: symbol_master

calendar:
  source: kdb
  table: trading_calendar
  date_column: date
  is_trading_day_column: is_trading_day

period:
  start_date: "2026-05-01"
  end_date: "2026-05-22"
  trading_sessions:
    - ["09:00:00", "11:30:00"]
    - ["12:30:00", "15:30:00"]

intraday:
  bucket_size: "5m"
  align_to_session: true
  auction_buckets:
    enabled: true
    labels:
      morning_open: AMO
      morning_close: AMC
      afternoon_open: PMO
      afternoon_close: PMC
    sort_order_column: sort_order

groups:
  - market_cap_bucket
  - market_segment
  - sector
  - topix_bucket

reference:
  method: same_intraday_bucket
  lookback_days: 20
  statistic: median
  observation_unit: trading_day
  comparable_keys:
    - metric_name
    - time_bucket
    - group
  min_samples_for_z_score: 30
  min_samples_for_empirical_percentile: 10
  default_user_facing_score: empirical_percentile
  default_technical_score: robust_z_score
  insufficient_history_behavior: change_only

metrics:
  - turnover
  - volume
  - trade_count
  - quoted_spread_bps
  - quoted_spread_ticks
  - top_of_book_depth
  - realized_volatility
  - effective_spread_bps
  - price_impact_30s_bps
  - signed_turnover
  - trade_imbalance
  - primary_quote_reversion_10ms_bps
  - primary_quote_reversion_100ms_bps
  - primary_quote_reversion_500ms_bps
  - primary_quote_reversion_1s_bps
  - primary_quote_reversion_5s_bps
  - primary_quote_reversion_10s_bps

commentary:
  mode: template
  llm_enabled: false
  alert_zscore_threshold: 2.0
  watch_zscore_threshold: 1.5
  max_comments_per_page: 5

toxicity:
  enabled: true
  section_title: "Cross-Venue Toxicity"
  primary_venue: "TSE"
  venues:
    - "TSE"
    - "SBIJ"
    - "ODX"
  reversion_horizons:
    - "10ms"
    - "100ms"
    - "500ms"
    - "1s"
    - "5s"
    - "10s"
  default_visual:
    type: "venue_reversion_curve"
    x_axis: "horizon"
    y_axis: "reversion_bps"
    series: "venue"
  side_source: "feed"  # feed | inferred
  event_clustering:
    enabled: true
    window: "100ms"
  filters:
    exclude_auction: true
    exclude_stale_primary_quote: true
    max_primary_quote_age: "1s"
  confidence:
    min_trade_count: 100
    min_notional: 100000000
